<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋家互動單字閃卡</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心與 Babel (用於即時編譯 JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 配置區域 ---
        const apiKey = ""; // 環境自動注入
        const VOICE_MODEL = "Kore"; 
        const WORD_DATA = [
            { word: "Adventure",  pos: "n./v.", chinese: "冒險" },
            { word: "Delighted",  pos: "adj.",  chinese: "高興的" },
            { word: "Dream",      pos: "n./v.", chinese: "夢想" },
            { word: "Enjoy",      pos: "v.",    chinese: "享受" },
            { word: "Grumbled",   pos: "v.",    chinese: "抱怨" },
            { word: "Moonlight",  pos: "n.",    chinese: "月光" },
            { word: "Neighbor",   pos: "n.",    chinese: "鄰居" },
            { word: "Nighttime",  pos: "n.",    chinese: "深夜" },
            { word: "Starry",     pos: "adj.",  chinese: "繁星點點的" },
            { word: "Flashlight", pos: "n.",    chinese: "手電筒" },
        ];

        // 圖示組件替代 (Lucide 在 CDN 模式下需手動處理或使用 SVG)
        const StarIcon = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
        );

        const VolumeIcon = ({ size }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
            </svg>
        );

        // 單張卡片組件
        const Flashcard = ({ data, index, speakFn, isSpeaking }) => {
            const [isFlipped, setIsFlipped] = useState(false);

            return (
                <div className="relative w-full aspect-[2.5/3.5] perspective-1000 cursor-pointer" onClick={() => setIsFlipped(!isFlipped)}>
                    <div className={`relative w-full h-full transition-transform duration-700 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                        {/* 正面 */}
                        <div className="absolute inset-0 backface-hidden bg-white rounded-2xl shadow-md border-2 border-slate-100 flex flex-col items-center justify-center p-4">
                            <div className="relative flex items-center justify-center mb-8">
                                <StarIcon size={100} className="text-amber-400 fill-amber-50" />
                                <span className="absolute text-2xl font-black text-amber-600 mt-1">{index + 1}</span>
                            </div>
                            <button
                                onClick={(e) => { e.stopPropagation(); speakFn(data.word); }}
                                disabled={isSpeaking}
                                className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-full shadow-md disabled:opacity-50"
                            >
                                <VolumeIcon size={20} />
                                <span className="font-bold text-sm">發音</span>
                            </button>
                        </div>
                        {/* 反面 */}
                        <div className="absolute inset-0 backface-hidden bg-white rounded-2xl shadow-xl border-4 border-indigo-500 flex flex-col items-center justify-center p-6 rotate-y-180 text-center">
                            <span className="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-md text-xs font-bold mb-3">{data.pos}</span>
                            <h2 className="text-2xl font-black text-slate-800 break-words mb-4">{data.word}</h2>
                            <div className="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-4"></div>
                            <p className="text-xl font-bold text-indigo-700">{data.chinese}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [speakingWord, setSpeakingWord] = useState(null);

            const pcmToWav = (pcmBase64, sampleRate = 24000) => {
                const byteCharacters = atob(pcmBase64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
                const byteArray = new Uint8Array(byteNumbers);
                const pcmData = new Int16Array(byteArray.buffer);
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                view.setUint32(0, 0x52494646, false);
                view.setUint32(4, 36 + pcmData.length * 2, true);
                view.setUint32(8, 0x57415645, false);
                view.setUint32(12, 0x666d7420, false);
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                view.setUint32(36, 0x64617461, false);
                view.setUint32(40, pcmData.length * 2, true);
                for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const speakWord = async (word) => {
                if (speakingWord) return;
                setSpeakingWord(word);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Pronounce clearly: ${word}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: VOICE_MODEL } } }
                            }
                        })
                    });
                    const data = await response.json();
                    const audioBase64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (audioBase64) {
                        const audio = new Audio(URL.createObjectURL(pcmToWav(audioBase64)));
                        audio.play();
                    }
                } catch (e) { console.error(e); }
                finally { setSpeakingWord(null); }
            };

            return (
                <div className="min-h-screen p-6 sm:p-12">
                    <div className="max-w-7xl mx-auto">
                        <header className="text-center mb-12">
                            <div className="inline-block bg-indigo-600 text-white px-4 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase mb-4 shadow-lg">海洋家</div>
                            <h1 className="text-4xl font-black text-slate-900 mb-3 tracking-tight italic underline decoration-indigo-200 underline-offset-8">Weekly Flashcards</h1>
                            <p className="text-slate-500 font-medium">標準美式發音系統 (Kore)</p>
                        </header>
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                            {WORD_DATA.map((data, index) => (
                                <Flashcard key={index} index={index} data={data} speakFn={speakWord} isSpeaking={speakingWord === data.word} />
                            ))}
                        </div>
                        <footer className="mt-20 text-center border-t border-slate-200 pt-8">
                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">點擊卡片翻轉 ・ 點擊發音聽讀</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
