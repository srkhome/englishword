<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋家互動單字閃卡 - GitHub 相容版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心與 Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- 數據配置 ---
        const WORD_DATA = [
            { word: "Adventure",  pos: "n./v.", chinese: "冒險" },
            { word: "Delighted",  pos: "adj.",  chinese: "高興的" },
            { word: "Dream",      pos: "n./v.", chinese: "夢想" },
            { word: "Enjoy",      pos: "v.",    chinese: "享受" },
            { word: "Grumbled",   pos: "v.",    chinese: "抱怨" },
            { word: "Moonlight",  pos: "n.",    chinese: "月光" },
            { word: "Neighbor",   pos: "n.",    chinese: "鄰居" },
            { word: "Nighttime",  pos: "n.",    chinese: "深夜" },
            { word: "Starry",     pos: "adj.",  chinese: "繁星點點的" },
            { word: "Flashlight", pos: "n.",    chinese: "手電筒" },
        ];

        // 圖示組件
        const StarIcon = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
        );

        const VolumeIcon = ({ size }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
            </svg>
        );

        // 單張卡片組件
        const Flashcard = ({ data, index, speakFn }) => {
            const [isFlipped, setIsFlipped] = useState(false);

            return (
                <div className="relative w-full aspect-[2.5/3.5] perspective-1000 cursor-pointer" onClick={() => setIsFlipped(!isFlipped)}>
                    <div className={`relative w-full h-full transition-transform duration-700 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                        {/* 正面 */}
                        <div className="absolute inset-0 backface-hidden bg-white rounded-2xl shadow-md border-2 border-slate-100 flex flex-col items-center justify-center p-4">
                            <div className="relative flex items-center justify-center mb-8">
                                <StarIcon size={100} className="text-amber-400 fill-amber-50" />
                                <span className="absolute text-2xl font-black text-amber-600 mt-1">{index + 1}</span>
                            </div>
                            <button
                                onClick={(e) => { e.stopPropagation(); speakFn(data.word); }}
                                className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-full shadow-md active:scale-95 transition-all"
                            >
                                <VolumeIcon size={20} />
                                <span className="font-bold text-sm">發音</span>
                            </button>
                        </div>
                        {/* 反面 */}
                        <div className="absolute inset-0 backface-hidden bg-white rounded-2xl shadow-xl border-4 border-indigo-500 flex flex-col items-center justify-center p-6 rotate-y-180 text-center">
                            <span className="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-md text-xs font-bold mb-3">{data.pos}</span>
                            <h2 className="text-2xl font-black text-slate-800 break-words mb-4">{data.word}</h2>
                            <div className="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-4"></div>
                            <p className="text-xl font-bold text-indigo-700">{data.chinese}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isVoiceReady, setIsVoiceReady] = useState(false);

            // 初始化語音引擎 (針對 GitHub/Chrome 優化)
            useEffect(() => {
                const initVoice = () => {
                    const voices = window.speechSynthesis.getVoices();
                    if (voices.length > 0) {
                        setIsVoiceReady(true);
                    }
                };

                initVoice();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = initVoice;
                }
            }, []);

            // 優化發音邏輯 (解決 iOS/GitHub 靜音問題)
            const speakWord = useCallback((word) => {
                // 1. 先停止所有發音
                window.speechSynthesis.cancel();

                // 2. 建立語音物件
                const utterance = new SpeechSynthesisUtterance(word);
                
                // 3. 設定參數 (優先尋找高品質英文語音)
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;

                // 4. 針對 Chrome 的 Bug 修復：確保語音實例不會被垃圾回收
                window._utterance = utterance; 

                // 5. 執行發音
                window.speechSynthesis.speak(utterance);
            }, []);

            return (
                <div className="min-h-screen p-6 sm:p-12">
                    <div className="max-w-7xl mx-auto">
                        <header className="text-center mb-12">
                            <div className="inline-block bg-indigo-600 text-white px-4 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase mb-4 shadow-lg">海洋家</div>
                            <h1 className="text-4xl font-black text-slate-900 mb-3 tracking-tight italic">Interactive Cards</h1>
                            <p className="text-slate-500 font-medium">GitHub 部署優化版 (免 API)</p>
                            
                            {!isVoiceReady && (
                                <p className="mt-4 text-amber-500 text-xs animate-pulse-soft font-bold">
                                    提示：首次使用請點擊任何發音按鈕以啟用語音引擎
                                </p>
                            )}
                        </header>
                        
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                            {WORD_DATA.map((data, index) => (
                                <Flashcard key={index} index={index} data={data} speakFn={speakWord} />
                            ))}
                        </div>
                        
                        <footer className="mt-20 text-center border-t border-slate-200 pt-8">
                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest leading-loose">
                                海洋家 英語數位教材<br/>
                                相容 Chrome, Safari, Edge
                            </p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
