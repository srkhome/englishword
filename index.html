<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL 海洋家 - 每週單字導覽</title>
    <!-- 使用 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義漸層背景與過渡效果 */
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .nav-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-4xl mx-auto">
        <!-- 標題區域 -->
        <header class="text-center mb-12">
            <h1 class="text-3xl font-extrabold text-sky-900 sm:text-4xl tracking-tight">
                ESL 海洋家
            </h1>
            <p class="mt-3 text-xl text-sky-600 font-medium">
                每週單字
            </p>
            <div class="mt-4 h-1.5 w-20 bg-sky-500 mx-auto rounded-full"></div>
        </header>

        <!-- 連結按鈕網格 -->
        <div id="links-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
            <!-- 腳本將在此處生成按鈕 -->
        </div>

        <!-- 頁尾 -->
        <footer class="mt-16 text-center text-gray-400 text-sm">
            &copy; 2024 ESL 海洋家 | 英語學習教材系統
        </footer>
    </div>

    <script>
        /**
         * 自動生成 15 個每週單字連結按鈕
         */
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('links-grid');
            
            for (let i = 1; i <= 15; i++) {
                // 建立連結元素
                const link = document.createElement('a');
                link.href = `w${i}.html`;
                link.className = "nav-card bg-white p-6 rounded-2xl border border-sky-100 text-center flex flex-col items-center justify-center hover:border-sky-400 hover:text-sky-600 group shadow-sm";
                
                // 按鈕內容
                link.innerHTML = `
                    <span class="text-xs font-semibold text-sky-300 group-hover:text-sky-400 mb-1 uppercase tracking-widest">Week</span>
                    <span class="text-2xl font-black tracking-tighter">w${i}</span>
                    <div class="mt-3 opacity-0 group-hover:opacity-100 transition-all transform translate-x-[-5px] group-hover:translate-x-0">
                        <svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </div>
                `;
                
                grid.appendChild(link);
            }
        });
    </script>
</body>
</html>
